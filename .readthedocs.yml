# .readthedocs.yml
version: 2

build:
  os: ubuntu-22.04
  tools:
    python: "3.9"

# 核心：使用 Jinja2 条件判断，根据环境变量选择配置文件。
# 注意：需要在 Read the Docs 后台为中文项目设置环境变量 RTD_LANG=zh
sphinx:
  configuration: |
    {% if env.get('RTD_LANG', 'en') == 'zh' %}
    docs/source_zh/conf.py
    {% else %}
    docs/source/conf.py
    {% endif %}

python:
  install:
    - requirements: docs/requirements.txt
