# .readthedocs.yml
version: 2

build:
  os: ubuntu-22.04
  tools:
    python: "3.9"

# 必须声明此键以满足平台检查，即使命令被覆盖
sphinx:
  configuration: docs/source/conf.py

# 使用 jobs 覆盖默认的构建过程
jobs:
  build:
    # 注意：这是正确的语法，`build` 的值是一个命令列表
    # 根据环境变量 READTHEDOCS_PROJECT 判断构建哪个目录
    - |
      if [ "$READTHEDOCS_PROJECT" = "riemann-zh" ]; then
        echo "Building Chinese documentation from docs/source_zh/"
        sphinx-build -b html docs/source_zh/ _build/html
      else
        echo "Building English documentation from docs/source/"
        sphinx-build -b html docs/source/ _build/html
      fi

python:
  install:
    - requirements: docs/requirements.txt
