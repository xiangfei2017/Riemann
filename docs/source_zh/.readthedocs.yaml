# .readthedocs.zh.yml
# Read the Docs configuration file for Chinese documentation
# See https://docs.readthedocs.io/en/stable/config-file/v2.html for details

# Required
version: 2

# Set the version of Python and other tools you might need
build:
  os: ubuntu-22.04
  tools:
    python: "3.9"

# Build documentation in the docs/ directory with Sphinx (Chinese version)
sphinx:
  configuration: docs/source_zh/conf.py
  builder: html
  fail_on_warning: false

# Optionally declare the Python requirements required to build your docs
python:
  install:
    - requirements: docs/requirements.txt

# Build formats
formats:
  - htmlzip

# Search configuration for Chinese
search:
  ranking:
    api/*: 5
    tutorial/*: 10
